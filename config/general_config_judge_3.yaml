evaluation:
  evaluator_params:
    default_judge:
      api_key: EMPTY
      base_url: http://localhost:8080/v1
      max_tokens: 2048
      model: gpt-oss-120b
      temperature: 0.0
  evaluators:
  - default_judge
experiment:
  mode: response_only
  random_seed: 42
  verbose: false
response_generation:
  enable_reasoning_split: false
  reasoning_split_strategy: auto
  judge_use_final_answer: true
  defenses:
  - None
  models:
  - Kimi-VL-A3B-Instruct
system:
  batch_size: 8
  log_file: logs/experiment_figstep.log
  log_level: INFO
  max_workers: 10
  output_dir: output_sample/
test_case_generation:
  attacks:
  - figstep
  input:
    behaviors_file: /mnt/disk1/szchen/VLMBenchmark/repo/OmniSafeBench-MM/dataset/data_sample50.json
